<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Lightbox</title>
  <style>
    /* Add your lightbox styles here */
    #lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      justify-content: center;
      align-items: center;
    }

    #lightbox img {
      max-width: 80%;
      max-height: 80%;
    }
  </style>
</head>
<body>

  <!-- Lightbox container -->
  <div id="lightbox">
    <img id="lightbox-img" src="" alt="Lightbox Image">
  </div>

  <!-- Images -->
  <img src="public/gallery/09-proyecto-ley-indrustrias/01.webp" alt="Image 1">
  <img src="public/gallery/09-proyecto-ley-indrustrias/02.webp" alt="Image 2">
  <img src="public/gallery/09-proyecto-ley-indrustrias/05.webp" alt="Image 3">

  <script>
    // Get all images and add click event listener
    const images = document.querySelectorAll('img');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');

    images.forEach(image => {
      image.addEventListener('click', () => {
        // Set the source of the lightbox image
        lightboxImg.src = image.src;
        // Display the lightbox
        lightbox.style.display = 'flex';
      });
    });

    // Close the lightbox when clicking outside the image
    lightbox.addEventListener('click', () => {
      lightbox.style.display = 'none';
    });
  </script>

</body>
</html>
